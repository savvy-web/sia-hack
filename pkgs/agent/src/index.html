<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const clearBtn = document.getElementById('clear-btn');
const suggestionsEl = document.getElementById('suggestions');
const welcomeState = document.getElementById('welcome-state');
const authOverlay = document.getElementById('auth-overlay');
const authPassword = document.getElementById('auth-password');
const authSubmit = document.getElementById('auth-submit');
const authError = document.getElementById('auth-error');
const degenScoreEl = document.getElementById('degen-score');
const rotatingQuote = document.getElementById('rotating-quote');

let sessionId = crypto.randomUUID();
let streaming = false;
let authToken = sessionStorage.getItem('oracle_token');
let degenScore = Number(sessionStorage.getItem('degen_score') || '0');

// --- Audio toggles ---
const sfxToggle = document.getElementById('sfx-toggle');
const voiceToggle = document.getElementById('voice-toggle');
let sfxEnabled = sessionStorage.getItem('sfx_enabled') !== 'false'; // default ON
let voiceEnabled = sessionStorage.getItem('voice_enabled') === 'true'; // default OFF

function syncToggleUI() {
  sfxToggle.classList.toggle('active', sfxEnabled);
  voiceToggle.classList.toggle('active', voiceEnabled);
}
syncToggleUI();

sfxToggle.addEventListener('click', () => {
  sfxEnabled = !sfxEnabled;
  sessionStorage.setItem('sfx_enabled', String(sfxEnabled));
  syncToggleUI();
});

voiceToggle.addEventListener('click', () => {
  voiceEnabled = !voiceEnabled;
  sessionStorage.setItem('voice_enabled', String(voiceEnabled));
  if (!voiceEnabled) stopTts();
  syncToggleUI();
});

// --- SFX Engine (Web Audio API) ---
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioContext();
  return audioCtx;
}

function playCrash() {
  const ctx = getAudioCtx();
  const dur = 0.6;
  const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) {
    data[i] = (Math.random() * 2 - 1) * (1 - i / data.length) ** 2;
  }
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.4, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(4000, ctx.currentTime);
  filter.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + dur);
  src.connect(filter).connect(gain).connect(ctx.destination);
  src.start(); src.stop(ctx.currentTime + dur);
}

function playRocket() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(200, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.5);
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
  osc.connect(gain).connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.6);
}

function playChing() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(2400, ctx.currentTime);
  const osc2 = ctx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(3600, ctx.currentTime);
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.25, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
  osc.connect(gain);
  osc2.connect(gain);
  gain.connect(ctx.destination);
  osc.start(); osc2.start();
  osc.stop(ctx.currentTime + 0.8); osc2.stop(ctx.currentTime + 0.8);
}

function playWhale() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(60, ctx.currentTime);
  osc.frequency.setValueAtTime(80, ctx.currentTime + 0.3);
  osc.frequency.setValueAtTime(55, ctx.currentTime + 0.6);
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.4, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.0);
  osc.connect(gain).connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 1.0);
}

function playMonkey() {
  const ctx = getAudioCtx();
  for (let i = 0; i < 4; i++) {
    const osc = ctx.createOscillator();
    osc.type = 'square';
    osc.frequency.setValueAtTime(800 + i * 200, ctx.currentTime + i * 0.08);
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.08);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.08 + 0.1);
    osc.connect(gain).connect(ctx.destination);
    osc.start(ctx.currentTime + i * 0.08);
    osc.stop(ctx.currentTime + i * 0.08 + 0.1);
  }
}

function playCheer() {
  const ctx = getAudioCtx();
  const dur = 0.5;
  const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) {
    const env = Math.sin(Math.PI * i / data.length);
    data[i] = (Math.random() * 2 - 1) * env * 0.3;
  }
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 3000;
  filter.Q.value = 0.5;
  src.connect(filter).connect(ctx.destination);
  src.start(); src.stop(ctx.currentTime + dur);
}

function playSad() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(500, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.8);
  const lfo = ctx.createOscillator();
  lfo.frequency.value = 6;
  const lfoGain = ctx.createGain();
  lfoGain.gain.value = 100;
  lfo.connect(lfoGain).connect(osc.frequency);
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.9);
  osc.connect(gain).connect(ctx.destination);
  osc.start(); lfo.start();
  osc.stop(ctx.currentTime + 0.9); lfo.stop(ctx.currentTime + 0.9);
}

function playDice() {
  const ctx = getAudioCtx();
  for (let i = 0; i < 6; i++) {
    const osc = ctx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.value = 1000 + Math.random() * 2000;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.12, ctx.currentTime + i * 0.04);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.04 + 0.05);
    osc.connect(gain).connect(ctx.destination);
    osc.start(ctx.currentTime + i * 0.04);
    osc.stop(ctx.currentTime + i * 0.04 + 0.05);
  }
}

function playBell() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = 1500;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);
  osc.connect(gain).connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 1.2);
}

function playBoom() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(120, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.5);
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.5, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
  osc.connect(gain).connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.5);
}

function playAlarm() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  osc.type = 'square';
  osc.frequency.setValueAtTime(600, ctx.currentTime);
  const lfo = ctx.createOscillator();
  lfo.frequency.value = 8;
  const lfoGain = ctx.createGain();
  lfoGain.gain.value = 300;
  lfo.connect(lfoGain).connect(osc.frequency);
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.2, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
  osc.connect(gain).connect(ctx.destination);
  osc.start(); lfo.start();
  osc.stop(ctx.currentTime + 0.8); lfo.stop(ctx.currentTime + 0.8);
}

const SFX_MAP = {
  crash: playCrash, rocket: playRocket, ching: playChing,
  whale: playWhale, monkey: playMonkey, cheer: playCheer,
  sad: playSad, dice: playDice, bell: playBell,
  boom: playBoom, alarm: playAlarm,
};

const SFX_TRIGGERS = [
  { pattern: /\b(rekt|rug(ged)?|dump(ed|ing)?)\b/i, sfx: 'crash' },
  { pattern: /\b(moon(ing|ed)?|pump(ing|ed)?)\b/i, sfx: 'rocket' },
  { pattern: /\b(mispriced|edge|free money)\b/i, sfx: 'ching' },
  { pattern: /\bwhale/i, sfx: 'whale' },
  { pattern: /\bape[ds]?\b/i, sfx: 'monkey' },
  { pattern: /\b(lfg|wagmi)\b/i, sfx: 'cheer' },
  { pattern: /\b(ngmi|cooked|bagholders?)\b/i, sfx: 'sad' },
  { pattern: /\bdegen/i, sfx: 'dice' },
  { pattern: /\bgigabrain/i, sfx: 'bell' },
  { pattern: /\bchad move/i, sfx: 'boom' },
  { pattern: /\bsqueeze/i, sfx: 'alarm' },
];

let sfxScanOffset = 0;
let sfxPlayedThisResponse = new Set();

function resetSfxTracking() {
  sfxScanOffset = 0;
  sfxPlayedThisResponse = new Set();
}

function scanForSfx(text) {
  if (!sfxEnabled) return;
  const newText = text.slice(sfxScanOffset);
  sfxScanOffset = text.length;
  if (!newText) return;
  for (const { pattern, sfx } of SFX_TRIGGERS) {
    if (sfxPlayedThisResponse.has(sfx)) continue;
    if (pattern.test(newText)) {
      sfxPlayedThisResponse.add(sfx);
      SFX_MAP[sfx]();
      break; // max 1 SFX per chunk
    }
  }
}

// --- TTS Client ---
let currentTtsAudio = null;

function stopTts() {
  if (currentTtsAudio) {
    currentTtsAudio.pause();
    currentTtsAudio.currentTime = 0;
    currentTtsAudio = null;
  }
}

async function playTts(text, msgDiv) {
  if (!voiceEnabled || !authToken || text.length < 10) return;
  stopTts();
  try {
    const res = await fetch('/tts', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${authToken}`,
      },
      body: JSON.stringify({ text }),
    });
    if (res.status === 401) {
      sessionStorage.removeItem('oracle_token');
      authToken = null;
      showAuth();
      return;
    }
    if (!res.ok) return; // silently fail
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentTtsAudio = audio;
    audio.play().catch(() => {}); // ignore autoplay policy
    audio.addEventListener('ended', () => {
      URL.revokeObjectURL(url);
      if (currentTtsAudio === audio) currentTtsAudio = null;
    });
    // Add replay button
    addReplayBtn(msgDiv, blob);
  } catch {
    // TTS failed silently
  }
}

function addReplayBtn(msgDiv, blob) {
  const btn = document.createElement('button');
  btn.className = 'replay-btn';
  btn.textContent = '🔊 Replay';
  btn.addEventListener('click', () => {
    stopTts();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentTtsAudio = audio;
    audio.play().catch(() => {});
    audio.addEventListener('ended', () => {
      URL.revokeObjectURL(url);
      if (currentTtsAudio === audio) currentTtsAudio = null;
    });
  });
  msgDiv.appendChild(btn);
}

async function doAuth() {
  const pw = authPassword.value.trim();
  if (!pw) return;
  authSubmit.disabled = true;
  authError.style.display = 'none';
  try {
    const res = await fetch('/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });
    if (!res.ok) {
      authError.style.display = 'block';
      authSubmit.disabled = false;
      return;
    }
    const data = await res.json();
    authToken = data.token;
    sessionStorage.setItem('oracle_token', authToken);
    hideAuth();
  } catch {
    authError.style.display = 'block';
    authSubmit.disabled = false;
  }
}

// --- Markdown rendering (minimal) ---
function renderMarkdown(text) {
  let html = text
    // Code blocks
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    // Inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // Headers
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // Bold
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    // Italic
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    // Tables
    .replace(/^\|(.+)\|$/gm, (match) => {
      const cells = match.split('|').filter(c => c.trim());
      if (cells.every(c => /^[\s-:]+$/.test(c))) return '<!-- sep -->';
      return `<tr>${cells.map(c => `<td>${c.trim()}</td>`).join('')}</tr>`;
    })
    // Unordered lists
    .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
    // Ordered lists
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    // Horizontal rules
    .replace(/^---+$/gm, '<hr>')
    // Line breaks
    .replace(/\n/g, '<br>');

  // Wrap consecutive <li> in <ul>
  html = html.replace(/((?:<li>.*?<\/li><br>?)+)/g, '<ul>$1</ul>');
  // Wrap consecutive <tr> in <table>
  html = html.replace(/((?:<tr>.*?<\/tr><br>?)+)/g, '<table>$1</table>');
  // Clean up separators and extra <br> in tables
  html = html.replace(/<!-- sep --><br>?/g, '');
  html = html.replace(/<table>(.*?)<\/table>/gs, (_, inner) => {
    const cleaned = inner.replace(/<br>/g, '');
    // Make first row header
    const headerified = cleaned.replace(/<tr>(.*?)<\/tr>/, (m, _cells) =>
      m.replace(/<td>/g, '<th>').replace(/<\/td>/g, '</th>')
    );
    return `<table>${headerified}</table>`;
  });
  // Clean up <br> in lists
  html = html.replace(/<ul>(.*?)<\/ul>/gs, (_, inner) =>
    `<ul>${inner.replace(/<br>/g, '')}</ul>`
  );

  return html;
}

// --- Send message ---
async function sendMessage(text) {
  if (!text.trim() || streaming) return;
  streaming = true;
  sendBtn.disabled = true;

  // Hide welcome state and suggestions
  if (welcomeState) welcomeState.style.display = 'none';
  suggestionsEl.style.display = 'none';

  // Bump degen score
  updateDegenScore(Math.floor(Math.random() * 5) + 1);

  // Add user message
  const userDiv = document.createElement('div');
  userDiv.className = 'msg user';
  userDiv.textContent = text;
  messagesEl.appendChild(userDiv);

  // Create assistant message container
  const assistantDiv = document.createElement('div');
  assistantDiv.className = 'msg assistant';
  const contentDiv = document.createElement('div');
  contentDiv.className = 'content';
  assistantDiv.appendChild(contentDiv);
  messagesEl.appendChild(assistantDiv);

  let fullText = '';
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  contentDiv.appendChild(cursor);
  resetSfxTracking();
  stopTts();

  scrollToBottom();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Session-Id': sessionId,
        'Authorization': `Bearer ${authToken}`,
      },
      body: JSON.stringify({ message: text }),
    });

    if (res.status === 401) {
      sessionStorage.removeItem('oracle_token');
      authToken = null;
      showAuth();
      cursor.remove();
      streaming = false;
      sendBtn.disabled = false;
      return;
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      let eventType = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7);
        } else if (line.startsWith('data: ') && eventType) {
          const data = JSON.parse(line.slice(6));

          if (eventType === 'text') {
            fullText += data.text;
            contentDiv.innerHTML = renderMarkdown(fullText);
            contentDiv.appendChild(cursor);
            scanForSfx(fullText);
            scrollToBottom();
          } else if (eventType === 'tool_call') {
            updateDegenScore(2);
            const badge = document.createElement('div');
            badge.className = 'tool-badge';
            badge.id = `tool-${data.name}-${Date.now()}`;
            const emoji = TOOL_EMOJIS[data.name] || '🎲';
            badge.innerHTML = `<span class="icon">${emoji}</span>${escapeHtml(data.name)}`;
            contentDiv.appendChild(badge);
            contentDiv.appendChild(cursor);
            scrollToBottom();
          } else if (eventType === 'tool_result') {
            // Mark the most recent badge for this tool as done
            const badges = contentDiv.querySelectorAll('.tool-badge:not(.done)');
            for (const b of badges) {
              if (b.textContent.includes(data.name)) {
                b.classList.add('done');
                break;
              }
            }
          } else if (eventType === 'done') {
            playTts(fullText, assistantDiv);
          } else if (eventType === 'error') {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-msg';
            errorDiv.textContent = `💀 rekt: ${data.message}`;
            messagesEl.appendChild(errorDiv);
          }

          eventType = '';
        }
      }
    }
  } catch (err) {
    const errorDiv = document.createElement('div');
    errorDiv.className = 'error-msg';
    errorDiv.textContent = `💀 connection rekt: ${err.message}`;
    messagesEl.appendChild(errorDiv);
  }

  // Remove cursor
  cursor.remove();
  // Final render
  if (fullText) {
    contentDiv.innerHTML = renderMarkdown(fullText);
  }

  streaming = false;
  sendBtn.disabled = false;
  inputEl.focus();
  scrollToBottom();
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
