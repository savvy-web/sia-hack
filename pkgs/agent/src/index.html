<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oracle — Prediction Market Intelligence</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
    background: #0a0a0f;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 16px 24px;
    border-bottom: 1px solid #1a1a2e;
    background: #0d0d14;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #00d4ff;
    letter-spacing: 0.5px;
  }

  header .subtitle {
    font-size: 12px;
    color: #666;
    margin-top: 2px;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .msg {
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
    line-height: 1.6;
  }

  .msg.user {
    background: #1a1a2e;
    border: 1px solid #2a2a4e;
    border-radius: 12px;
    padding: 12px 16px;
    color: #c0c0d0;
  }

  .msg.assistant {
    padding: 4px 0;
  }

  .msg.assistant .content {
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .msg.assistant .content h1,
  .msg.assistant .content h2,
  .msg.assistant .content h3 {
    color: #00d4ff;
    margin: 16px 0 8px;
  }

  .msg.assistant .content h1 { font-size: 20px; }
  .msg.assistant .content h2 { font-size: 17px; }
  .msg.assistant .content h3 { font-size: 15px; }

  .msg.assistant .content strong { color: #fff; }

  .msg.assistant .content code {
    background: #1a1a2e;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    color: #ff79c6;
  }

  .msg.assistant .content pre {
    background: #12121c;
    border: 1px solid #1a1a2e;
    border-radius: 8px;
    padding: 12px;
    overflow-x: auto;
    margin: 8px 0;
  }

  .msg.assistant .content pre code {
    background: none;
    padding: 0;
    color: #e0e0e0;
  }

  .msg.assistant .content ul,
  .msg.assistant .content ol {
    padding-left: 24px;
    margin: 4px 0;
  }

  .msg.assistant .content table {
    border-collapse: collapse;
    margin: 8px 0;
    width: 100%;
    font-size: 13px;
  }

  .msg.assistant .content th,
  .msg.assistant .content td {
    border: 1px solid #2a2a4e;
    padding: 6px 10px;
    text-align: left;
  }

  .msg.assistant .content th {
    background: #1a1a2e;
    color: #00d4ff;
  }

  .tool-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #1a1a2e;
    border: 1px solid #2a2a4e;
    border-radius: 6px;
    padding: 4px 10px;
    margin: 4px 0;
    font-size: 12px;
    color: #888;
  }

  .tool-badge .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #ffa500;
  }

  .tool-badge.done .dot {
    background: #00cc66;
  }

  .cursor {
    display: inline-block;
    width: 2px;
    height: 16px;
    background: #00d4ff;
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  .error-msg {
    color: #ff4444;
    background: #1a0a0a;
    border: 1px solid #3a1a1a;
    border-radius: 8px;
    padding: 12px 16px;
    max-width: 800px;
    margin: 0 auto;
    width: 100%;
  }

  #suggestions {
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 8px 0;
  }

  .chip {
    background: #1a1a2e;
    border: 1px solid #2a2a4e;
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 13px;
    color: #aaa;
    cursor: pointer;
    transition: all 0.15s;
  }

  .chip:hover {
    background: #2a2a4e;
    color: #00d4ff;
    border-color: #00d4ff40;
  }

  #input-area {
    border-top: 1px solid #1a1a2e;
    padding: 16px 24px;
    background: #0d0d14;
    flex-shrink: 0;
  }

  #input-row {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
  }

  #input {
    flex: 1;
    background: #12121c;
    border: 1px solid #2a2a4e;
    border-radius: 8px;
    padding: 12px 16px;
    color: #e0e0e0;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    resize: none;
    min-height: 44px;
    max-height: 120px;
  }

  #input:focus { border-color: #00d4ff40; }

  #input::placeholder { color: #555; }

  #send-btn {
    background: #00d4ff;
    border: none;
    border-radius: 8px;
    padding: 0 20px;
    color: #0a0a0f;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }

  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #clear-btn {
    background: transparent;
    border: 1px solid #2a2a4e;
    border-radius: 8px;
    padding: 0 14px;
    color: #666;
    font-size: 13px;
    cursor: pointer;
    flex-shrink: 0;
  }

  #clear-btn:hover { color: #aaa; border-color: #444; }

  /* Password overlay */
  #auth-overlay {
    position: fixed;
    inset: 0;
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  #auth-overlay.hidden { display: none; }

  #auth-box {
    background: #0d0d14;
    border: 1px solid #1a1a2e;
    border-radius: 16px;
    padding: 40px;
    text-align: center;
    max-width: 380px;
    width: 100%;
  }

  #auth-box h2 {
    color: #00d4ff;
    font-size: 22px;
    margin-bottom: 6px;
  }

  #auth-box p {
    color: #666;
    font-size: 13px;
    margin-bottom: 24px;
  }

  #auth-password {
    width: 100%;
    background: #12121c;
    border: 1px solid #2a2a4e;
    border-radius: 8px;
    padding: 12px 16px;
    color: #e0e0e0;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    margin-bottom: 12px;
  }

  #auth-password:focus { border-color: #00d4ff40; }

  #auth-submit {
    width: 100%;
    background: #00d4ff;
    border: none;
    border-radius: 8px;
    padding: 12px;
    color: #0a0a0f;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }

  #auth-submit:hover { opacity: 0.85; }
  #auth-submit:disabled { opacity: 0.4; cursor: not-allowed; }

  #auth-error {
    color: #ff4444;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }
</style>
</head>
<body>

<div id="auth-overlay">
  <div id="auth-box">
    <h2>Oracle</h2>
    <p>Enter password to access the dashboard</p>
    <input type="password" id="auth-password" placeholder="Password" autocomplete="off">
    <button type="button" id="auth-submit">Unlock</button>
    <div id="auth-error">Incorrect password. Try again.</div>
  </div>
</div>

<header>
  <h1>Oracle</h1>
  <div class="subtitle">Prediction Market Intelligence — powered by Claude + Polymarket</div>
</header>

<div id="messages">
  <div id="suggestions">
    <div class="chip" data-q="What's the morning briefing?">Morning briefing</div>
    <div class="chip" data-q="What are the highest volume markets right now?">Top markets</div>
    <div class="chip" data-q="Tell me about crypto prediction markets">Crypto markets</div>
    <div class="chip" data-q="Find markets where the outcome is most uncertain">Most uncertain</div>
    <div class="chip" data-q="Compare the top political markets">Political markets</div>
  </div>
</div>

<div id="input-area">
  <div id="input-row">
    <textarea id="input" placeholder="Ask about prediction markets..." rows="1"></textarea>
    <button type="button" id="send-btn">Send</button>
    <button type="button" id="clear-btn">Clear</button>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const clearBtn = document.getElementById('clear-btn');
const suggestionsEl = document.getElementById('suggestions');
const authOverlay = document.getElementById('auth-overlay');
const authPassword = document.getElementById('auth-password');
const authSubmit = document.getElementById('auth-submit');
const authError = document.getElementById('auth-error');

let sessionId = crypto.randomUUID();
let streaming = false;
let authToken = sessionStorage.getItem('oracle_token');

// --- Auth ---
function showAuth() {
  authOverlay.classList.remove('hidden');
  authPassword.focus();
}

function hideAuth() {
  authOverlay.classList.add('hidden');
  inputEl.focus();
}

if (authToken) {
  hideAuth();
} else {
  showAuth();
}

async function doAuth() {
  const pw = authPassword.value.trim();
  if (!pw) return;
  authSubmit.disabled = true;
  authError.style.display = 'none';
  try {
    const res = await fetch('/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });
    if (!res.ok) {
      authError.style.display = 'block';
      authSubmit.disabled = false;
      return;
    }
    const data = await res.json();
    authToken = data.token;
    sessionStorage.setItem('oracle_token', authToken);
    hideAuth();
  } catch {
    authError.style.display = 'block';
    authSubmit.disabled = false;
  }
}

authSubmit.addEventListener('click', doAuth);
authPassword.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doAuth();
});

// --- Markdown rendering (minimal) ---
function renderMarkdown(text) {
  let html = text
    // Code blocks
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    // Inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // Headers
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // Bold
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    // Italic
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    // Tables
    .replace(/^\|(.+)\|$/gm, (match) => {
      const cells = match.split('|').filter(c => c.trim());
      if (cells.every(c => /^[\s-:]+$/.test(c))) return '<!-- sep -->';
      return `<tr>${cells.map(c => `<td>${c.trim()}</td>`).join('')}</tr>`;
    })
    // Unordered lists
    .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
    // Ordered lists
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    // Horizontal rules
    .replace(/^---+$/gm, '<hr>')
    // Line breaks
    .replace(/\n/g, '<br>');

  // Wrap consecutive <li> in <ul>
  html = html.replace(/((?:<li>.*?<\/li><br>?)+)/g, '<ul>$1</ul>');
  // Wrap consecutive <tr> in <table>
  html = html.replace(/((?:<tr>.*?<\/tr><br>?)+)/g, '<table>$1</table>');
  // Clean up separators and extra <br> in tables
  html = html.replace(/<!-- sep --><br>?/g, '');
  html = html.replace(/<table>(.*?)<\/table>/gs, (_, inner) => {
    const cleaned = inner.replace(/<br>/g, '');
    // Make first row header
    const headerified = cleaned.replace(/<tr>(.*?)<\/tr>/, (m, _cells) =>
      m.replace(/<td>/g, '<th>').replace(/<\/td>/g, '</th>')
    );
    return `<table>${headerified}</table>`;
  });
  // Clean up <br> in lists
  html = html.replace(/<ul>(.*?)<\/ul>/gs, (_, inner) =>
    `<ul>${inner.replace(/<br>/g, '')}</ul>`
  );

  return html;
}

// --- Send message ---
async function sendMessage(text) {
  if (!text.trim() || streaming) return;
  streaming = true;
  sendBtn.disabled = true;

  // Hide suggestions
  suggestionsEl.style.display = 'none';

  // Add user message
  const userDiv = document.createElement('div');
  userDiv.className = 'msg user';
  userDiv.textContent = text;
  messagesEl.appendChild(userDiv);

  // Create assistant message container
  const assistantDiv = document.createElement('div');
  assistantDiv.className = 'msg assistant';
  const contentDiv = document.createElement('div');
  contentDiv.className = 'content';
  assistantDiv.appendChild(contentDiv);
  messagesEl.appendChild(assistantDiv);

  let fullText = '';
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  contentDiv.appendChild(cursor);

  scrollToBottom();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Session-Id': sessionId,
        'Authorization': `Bearer ${authToken}`,
      },
      body: JSON.stringify({ message: text }),
    });

    if (res.status === 401) {
      sessionStorage.removeItem('oracle_token');
      authToken = null;
      showAuth();
      cursor.remove();
      streaming = false;
      sendBtn.disabled = false;
      return;
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      let eventType = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7);
        } else if (line.startsWith('data: ') && eventType) {
          const data = JSON.parse(line.slice(6));

          if (eventType === 'text') {
            fullText += data.text;
            contentDiv.innerHTML = renderMarkdown(fullText);
            contentDiv.appendChild(cursor);
            scrollToBottom();
          } else if (eventType === 'tool_call') {
            const badge = document.createElement('div');
            badge.className = 'tool-badge';
            badge.id = `tool-${data.name}-${Date.now()}`;
            badge.innerHTML = `<span class="dot"></span>${escapeHtml(data.name)}`;
            contentDiv.appendChild(badge);
            contentDiv.appendChild(cursor);
            scrollToBottom();
          } else if (eventType === 'tool_result') {
            // Mark the most recent badge for this tool as done
            const badges = contentDiv.querySelectorAll('.tool-badge:not(.done)');
            for (const b of badges) {
              if (b.textContent.includes(data.name)) {
                b.classList.add('done');
                break;
              }
            }
          } else if (eventType === 'error') {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-msg';
            errorDiv.textContent = `Error: ${data.message}`;
            messagesEl.appendChild(errorDiv);
          }

          eventType = '';
        }
      }
    }
  } catch (err) {
    const errorDiv = document.createElement('div');
    errorDiv.className = 'error-msg';
    errorDiv.textContent = `Connection error: ${err.message}`;
    messagesEl.appendChild(errorDiv);
  }

  // Remove cursor
  cursor.remove();
  // Final render
  if (fullText) {
    contentDiv.innerHTML = renderMarkdown(fullText);
  }

  streaming = false;
  sendBtn.disabled = false;
  inputEl.focus();
  scrollToBottom();
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// --- Event listeners ---
sendBtn.addEventListener('click', () => {
  sendMessage(inputEl.value);
  inputEl.value = '';
  inputEl.style.height = 'auto';
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage(inputEl.value);
    inputEl.value = '';
    inputEl.style.height = 'auto';
  }
});

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = `${Math.min(inputEl.scrollHeight, 120)}px`;
});

clearBtn.addEventListener('click', async () => {
  await fetch('/clear', {
    method: 'POST',
    headers: {
      'X-Session-Id': sessionId,
      'Authorization': `Bearer ${authToken}`,
    },
  });
  sessionId = crypto.randomUUID();
  messagesEl.innerHTML = '';
  messagesEl.appendChild(suggestionsEl);
  suggestionsEl.style.display = 'flex';
});

// Suggestion chips
suggestionsEl.addEventListener('click', (e) => {
  const chip = e.target.closest('.chip');
  if (chip) {
    sendMessage(chip.dataset.q);
  }
});

inputEl.focus();
</script>
</body>
</html>
